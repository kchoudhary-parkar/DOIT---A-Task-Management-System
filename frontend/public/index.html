<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- SEO basics -->
    <title>DOIT - AI-Powered Task Management System</title>
    <meta name="description" content="DOIT is an AI-powered project and task management system with sprints, Kanban boards, team chat, and built-in AI assistants." />
    <meta name="keywords" content="task management, project management, AI assistant, kanban, sprint planning, team collaboration" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://doitai.dpdns.org/" />

    <!-- Favicons (Google prefers a high-res PNG ≥48×48 in addition to .ico) -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Web app manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph (for social sharing & some search previews) -->
    <meta property="og:title" content="DOIT - AI-Powered Task Management System" />
    <meta property="og:description" content="AI-powered project management with Kanban, sprints, and team chat." />
    <meta property="og:url" content="https://doitai.dpdns.org/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://doitai.dpdns.org/logo512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:site_name" content="DOIT" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DOIT - AI-Powered Task Management System" />
    <meta name="twitter:description" content="AI-powered project management with Kanban, sprints, and team chat." />
    <meta name="twitter:image" content="https://doitai.dpdns.org/logo512.png" />

    <!-- Structured data: tells Google which image to use as the brand logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DOIT",
      "url": "https://doitai.dpdns.org/",
      "logo": "https://doitai.dpdns.org/logo512.png"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DOIT - AI-Powered Task Management System",
      "url": "https://doitai.dpdns.org/"
    }
