services:
  # ── Backend Web Service (FastAPI) ───────────────────────────────────────────
  - type: web
    name: doit-backend
    env: docker
    dockerContext: backend-2
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: doit-secrets

  # ── Warmup Cron (reduce cold-start latency) ───────────────────────────────
  - type: cron
    name: doit-backend-warmup
    env: node
    plan: free
    schedule: "*/5 * * * *"
    startCommand: node -e "require('https').get('https://' + process.env.BACKEND_HOST + '/warmup', (res) => { res.resume(); process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1); }).on('error', () => process.exit(1));"
    envVars:
      - key: BACKEND_HOST
        fromService:
          type: web
          name: doit-backend
          property: host

  # ── Celery Worker (Background Tasks) ────────────────────────────────────────
  - type: worker
    name: doit-worker
    env: docker
    dockerContext: backend-2
    dockerfilePath: Dockerfile
    dockerCommand: celery -A celery_app worker --loglevel=info -Q code_review
    plan: free
    envVars:
      - fromGroup: doit-secrets

  # ── Frontend Static Site (React) ────────────────────────────────────────────
  - type: static
    name: doit-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: doit-backend
          property: host
